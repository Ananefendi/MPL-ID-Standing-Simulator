<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MPL Season 17 Standings</title>

    <link rel="stylesheet" href="style.css" />
  </head>

  <body>
    <div class="app">
      <div class="topbar">
        <div class="topbar-brand">
          <div>
            <div class="topbar-title">MPL Season 17 Standings</div>
            <div class="topbar-sub">Regular Season</div>
          </div>
        </div>
        <div class="tab-bar">
          <button
            class="tab-btn active"
            id="tabSched"
            onclick="switchTab('schedule')"
          >
            Schedule
          </button>
          <button
            class="tab-btn"
            id="tabStand"
            onclick="switchTab('standings')"
          >
            Standings
          </button>
        </div>
      </div>

      <div class="week-nav">
        <div class="week-nav-inner" id="weekNav"></div>
      </div>

      <div class="main-panel">
        <div class="schedule-panel" id="schedulePanel">
          <div class="panel-header">
            <div
              style="
                display: flex;
                align-items: center;
                gap: 8px;
                flex-wrap: wrap;
              "
            >
              <span class="panel-title">Match Schedule</span>

              <select id="teamFilter" class="act-btn" style="padding: 4px 8px">
                <option value="ALL">All Teams</option>
              </select>
            </div>
            <div class="actions">
              <button class="act-btn" id="resetBtn">Currrent Standings</button>
              <button class="act-btn danger" id="clearBtn">Reset</button>
            </div>
          </div>

          <div class="schedule-content" id="schedContent"></div>
        </div>
        <div class="standings-panel" id="standingsPanel">
          <div class="panel-header">
            <span class="panel-title">Standings</span>
          </div>
          <div class="standings-content">
            <table>
              <thead>
                <tr>
                  <th>#</th>
                  <th>Tim</th>
                  <th style="color: var(--red)">Match Pts</th>
                  <th>Match W-L</th>
                  <th style="color: var(--red)">Net Game</th>
                  <th>Game W-L</th>
                </tr>
              </thead>
              <tbody id="standBody"></tbody>
            </table>
          </div>
        </div>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
