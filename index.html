<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MPL Season 17 Standings</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0
        }

        :root {
            --red: #ffa600;
            --red2: #e74c3c;
            --gold: #E8A020;
            --gold2: #f0b429;
            --bg: #0d0d0d;
            --bg2: #161616;
            --bg3: #1e1e1e;
            --bg4: #252525;
            --text: #f5f0e8;
            --text2: #c8b99a;
            --text3: #8a7a66;
            --border: #2e2e2e;
            --border2: #3a3a3a;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Segoe UI', system-ui, sans-serif;
            font-size: 13px;
            min-height: 100vh;
            padding: 0
        }

        .app {
            display: flex;
            flex-direction: column;
            min-height: 100vh
        }

        /* TOP BAR */
        .topbar {
            background: #0a0a0a;
            border-bottom: 2px solid var(--red);
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: wrap
        }

        .topbar-brand {
            display: flex;
            align-items: center;
            gap: 10px
        }

        .topbar-logo {
            width: 32px;
            height: 32px;
            background: var(--red);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 13px;
            color: #fff;
            letter-spacing: 1px;
            flex-shrink: 0
        }

        .topbar-title {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 2px;
            text-transform: uppercase
        }

        .topbar-sub {
            font-size: 10px;
            color: var(--text3);
            letter-spacing: 1px
        }

        .tab-bar {
            display: flex;
            gap: 4px
        }

        .tab-btn {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--text3);
            padding: 6px 14px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 1px;
            text-transform: uppercase;
            transition: .15s
        }

        .tab-btn.active {
            background: var(--red);
            border-color: var(--red);
            color: #fff
        }

        .tab-btn:hover:not(.active) {
            border-color: var(--text3);
            color: var(--text2)
        }

        /* WEEK NAV */
        .week-nav {
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            padding: 10px 16px;
            overflow-x: auto;
            white-space: nowrap
        }

        .week-nav-inner {
            display: inline-flex;
            gap: 6px;
            align-items: center
        }

        .week-dot-btn {
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            padding: 4px 8px;
            border-radius: 4px;
            transition: .15s;
            background: transparent;
            border: none
        }

        .week-dot-btn:hover .wlabel {
            color: var(--text2)
        }

        .week-dot-btn.active .wlabel {
            color: var(--red)
        }

        .week-dot-btn.active .wdot {
            background: var(--red)
        }

        .wlabel {
            font-size: 10px;
            color: var(--text3);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: .5px
        }

        .wdot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--border2);
            transition: .15s
        }

        .week-connector {
            width: 28px;
            height: 1px;
            background: var(--border);
            align-self: flex-end;
            margin-bottom: 8px
        }

        /* MAIN CONTENT */
        .main-panel {
            display: flex;
            flex: 1;
            gap: 0;
            overflow: hidden
        }

        .schedule-panel,
        .standings-panel {
            overflow-y: auto
        }

        /* SCHEDULE PANEL */
        .schedule-panel {
            flex: 1;
            min-width: 0;
            border-right: 1px solid var(--border);
            max-height: calc(100vh - 110px)
        }

        .panel-header {
            background: var(--bg2);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-wrap: wrap;
            position: sticky;
            top: 0;
            z-index: 5
        }

        .panel-title {
            font-size: 12px;
            font-weight: 700;
            color: var(--text2);
            letter-spacing: 2px;
            text-transform: uppercase
        }

        .actions {
            display: flex;
            gap: 6px
        }

        .act-btn {
            background: transparent;
            border: 1px solid var(--border2);
            color: var(--text3);
            padding: 5px 12px;
            border-radius: 3px;
            font-size: 11px;
            font-weight: 600;
            cursor: pointer;
            transition: .15s
        }

        .act-btn:hover {
            border-color: var(--text2);
            color: var(--text)
        }

        .act-btn.danger {
            border-color: #6b1a1a;
            color: #c0392b
        }

        .act-btn.danger:hover {
            background: var(--red);
            color: #fff
        }

        .schedule-content {
            padding: 12px
        }

        /* DAY SECTION */
        .day-section {
            margin-bottom: 20px
        }

        .day-header {
            padding: 6px 12px;
            margin-bottom: 8px;
            border-left: 3px solid var(--red);
            background: var(--bg3)
        }

        .day-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--text2);
            letter-spacing: 2px;
            text-transform: uppercase
        }

        /* MATCH CARD */
        .match-card {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: 4px;
            padding: 10px 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap
        }

        .match-teams {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0
        }

        .team-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            background: var(--bg4);
            padding: 4px 10px 4px 6px;
            border-radius: 3px;
            min-width: 0;
            flex-shrink: 1
        }

        .team-chip img {
            width: 22px;
            height: 22px;
            object-fit: contain;
            border-radius: 50%;
            background: #222;
            padding: 1px;
            flex-shrink: 0
        }

        .team-chip span {
            font-weight: 700;
            font-size: 11px;
            color: var(--text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis
        }

        .vs-badge {
            font-size: 10px;
            font-weight: 800;
            color: var(--red);
            background: #1a0a0a;
            padding: 2px 8px;
            border-radius: 2px;
            flex-shrink: 0
        }

        .score-wrap {
            flex-shrink: 0
        }

        .score-sel {
            background: var(--bg4);
            border: 1px solid var(--border2);
            color: var(--gold);
            font-weight: 800;
            font-size: 13px;
            padding: 5px 8px;
            border-radius: 3px;
            cursor: pointer;
            font-family: monospace;
            width: 76px;
            text-align: center
        }

        .score-sel:hover,
        .score-sel:focus {
            border-color: var(--red);
            outline: none
        }

        /* STANDINGS PANEL */
        .standings-panel {
            flex: 1.4;
            min-width: 0;
            max-height: calc(100vh - 110px)
        }

        .standings-content {
            overflow-x: auto
        }


        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 12px
        }

        thead tr {
            background: var(--bg2);
            border-bottom: 2px solid var(--red)
        }

        th {
            padding: 12px 10px;
            text-align: center;
            font-size: 10px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--text3);
            font-weight: 700
        }

        th:nth-child(2) {
            text-align: left
        }

        td {
            padding: 10px 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            color: var(--text)
        }

        td:nth-child(2) {
            text-align: left
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, .03)
        }

        .rank-cell {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 26px;
            height: 26px;
            border-radius: 4px;
            font-weight: 800;
            font-size: 12px;
            background: var(--bg4);
            color: var(--text3)
        }

        .rank-cell.r1 {
            background: var(--gold);
            color: #1a1000
        }

        .rank-cell.r2 {
            background: #4a4a4a;
            color: #ddd
        }

        .rank-cell.r3 {
            background: #3d2a10;
            color: #c8944a
        }

        .team-cell-inner {
            display: flex;
            align-items: center;
            gap: 8px
        }

        .team-cell-inner img {
            width: 24px;
            height: 24px;
            object-fit: contain;
            border-radius: 50%;
            background: var(--bg4);
            padding: 2px
        }

        .team-name-s {
            font-weight: 700;
            font-size: 12px
        }

        .mp-val {
            font-weight: 800;
            color: var(--red);
            font-size: 14px
        }

        .ng-pos {
            color: #ffa600;
            font-weight: 700
        }

        .ng-neg {
            color: var(--red);
            font-weight: 700
        }

        .top-row {
            background: rgba(74, 222, 128, .04)
        }

        .bot-row {
            background: rgba(192, 57, 43, .06)
        }

        /* MOBILE */
        @media(max-width:700px) {
            .main-panel {
                flex-direction: column
            }

            .schedule-panel,
            .standings-panel {
                max-height: none;
                border-right: none;
                border-bottom: 1px solid var(--border)
            }
            
            

            .schedule-panel.hidden,
            .standings-panel.hidden {
                display: none
            }

            .topbar-title {
                font-size: 12px
            }
        }

        @media(min-width:701px) {
            .tab-bar {
                display: none
            }

            .schedule-panel,
            .standings-panel {
                display: block !important
            }
        }

        .info-bar {
            background: var(--bg2);
            padding: 8px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 10px;
            color: var(--text3);
            letter-spacing: .5px
        }

        .week-group-label {
            font-size: 10px;
            font-weight: 700;
            color: var(--red);
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 4px 12px;
            background: #1a0606;
            border: 1px solid #3a1010;
            border-radius: 3px;
            margin-bottom: 8px;
            display: inline-block
        }
        #teamFilter {
    background: var(--bg3);
    color: var(--red);
    border: 1px solid var(--border);
    padding: 4px 8px;
    border-radius: 4px;
    outline: none;
    font-size: 12px;
}

#teamFilter option {
    background: var(--bg3);
    color: var(--red);
}

/* rapetin kolom rank */
th:first-child,
td:first-child {
    width: 40px;
    padding-left: 6px;
    padding-right: 6px;
}

/* rapetin kolom tim */
th:nth-child(2),
td:nth-child(2) {
    padding-left: 4px;
}

/* kecilkan jarak logo dan text */
.team-cell-inner {
    display: flex;
    align-items: center;
    gap: 6px;
}

/* kecilkan logo sedikit */
.team-cell-inner img {
    width: 20px;
    height: 20px;
}

/* rapetin padding row */
td {
    padding: 8px 8px;
}
    </style>
</head>

                </div>

            <div class="tab-bar">

                <button class="tab-btn" id="tabStand" onclick="switchTab('standings')">Standings</button>
            </div>
        </div>

        <div class="week-nav">
            <div class="week-nav-inner" id="weekNav"></div>
        </div>

        <div class="main-panel">

                        <select id="teamFilter" class="act-btn" style="padding:4px 8px;">

                    <div class="actions">

            { week: "Week 9", day: "Day 1", A: "BIGETRON BY VIT", B: "DEWA UNITED", aScore: 0, bScore: 0 },
            { week: "Week 9", day: "Day 1", A: "TEAM LIQUID ID", B: "ALTER EGO ESPORTS", aScore: 0, bScore: 0 },
            { week: "Week 9", day: "Day 2", A: "GEEK FAM", B: "TEAM LIQUID ID", aScore: 0, bScore: 0 },
            { week: "Week 9", day: "Day 2", A: "ALTER EGO ESPORTS", B: "RRQ", aScore: 0, bScore: 0 },
            { week: "Week 9", day: "Day 2", A: "BIGETRON BY VIT", B: "ONIC", aScore: 0, bScore: 0 },
            { week: "Week 9", day: "Day 3", A: "RRQ", B: "DEWA UNITED", aScore: 0, bScore: 0 },
            { week: "Week 9", day: "Day 3", A: "ONIC", B: "EVOS", aScore: 0, bScore: 0 },
            { week: "Week 9", day: "Day 3", A: "NAVI", B: "GEEK", aScore: 0, bScore: 0 }
        ];

        let schedule = [];
        let activeWeek = "Week 1";
        let mobileTab = "schedule";
        let activeTeam = "ALL";

        function loadSchedule() {
            try { const s = localStorage.getItem("mpl_sched_v2"); if (s) { schedule = JSON.parse(s); return; } } catch (e) { }
            schedule = JSON.parse(JSON.stringify(DEFAULT));
        }
        function saveSchedule() { try { localStorage.setItem("mpl_sched_v2", JSON.stringify(schedule)); } catch (e) { } }

        function computeStats() {
            const s = {};
            TEAMS.forEach(t => { s[t] = { name: t, win: 0, lose: 0, gw: 0, gl: 0 } });
            for (const m of schedule) {
                if (m.aScore === 0 && m.bScore === 0) continue;
                const a = s[m.A], b = s[m.B]; if (!a || !b) continue;
                a.gw += m.aScore; a.gl += m.bScore; b.gw += m.bScore; b.gl += m.aScore;
                if (m.aScore > m.bScore) { a.win++; b.lose++; } else { b.win++; a.lose++; }
            }
            for (const t in s) { s[t].mp = s[t].win; s[t].ng = s[t].gw - s[t].gl; }
            return s;
        }
        function h2h(a, b) {
            let aw = 0, bw = 0;
            for (const m of schedule) {
                if ((m.A === a && m.B === b) || (m.A === b && m.B === a)) {
                    const isA = m.A === a;
                    const sa = isA ? m.aScore : m.bScore, sb = isA ? m.bScore : m.aScore;
                    if (sa > sb) aw++; else if (sb > sa) bw++;
                }
            }
            return aw > bw ? -1 : bw > aw ? 1 : 0;
        }
        function sorted(stats) {
            return Object.values(stats).sort((a, b) => {
                if (a.mp !== b.mp) return b.mp - a.mp;
                if (a.win !== b.win) return b.win - a.win;
                if (a.ng !== b.ng) return b.ng - a.ng;
                if (a.gw !== b.gw) return b.gw - a.gw;
                const h = h2h(a.name, b.name); if (h !== 0) return h;
                return a.name.localeCompare(b.name);
            });
        }

        function renderWeekNav() {
            const weeks = [...new Set(DEFAULT.map(m => m.week))].sort((a, b) => parseInt(a.split(" ")[1]) - parseInt(b.split(" ")[1]));
            const nav = document.getElementById("weekNav");
            let html = "";
            weeks.forEach((w, i) => {
                if (i > 0) html += `<div class="week-connector"></div>`;
                html += `<button class="week-dot-btn${w === activeWeek ? " active" : ""}" onclick="setWeek('${w}')"><span class="wlabel">${w}</span><span class="wdot"></span></button>`;
            });
            nav.innerHTML = html;
        }

        function setWeek(w) { activeWeek = w; renderWeekNav(); renderSchedule(); }

        function renderSchedule() {
            const matches = schedule
                .map((m, i) => ({ ...m, i }))
                .filter(m =>
                    m.week === activeWeek &&
                    (activeTeam === "ALL" || m.A === activeTeam || m.B === activeTeam)
                );
            const dayMap = new Map();
            const dayOrder = { "Day 1": 1, "Day 2": 2, "Day 3": 3 };
            matches.forEach(m => { if (!dayMap.has(m.day)) dayMap.set(m.day, []); dayMap.get(m.day).push(m); });
            const days = [...dayMap.keys()].sort((a, b) => (dayOrder[a] || 0) - (dayOrder[b] || 0));
            let html = `<div class="week-group-label">${activeWeek}</div>`;
            if (!days.length) { html += '<div style="padding:24px;text-align:center;color:var(--text3)">Tidak ada pertandingan di week ini</div>'; }
            for (const day of days) {
                html += `<div class="day-section"><div class="day-header"><div class="day-label">${day}</div></div>`;
                for (const m of dayMap.get(day)) {
                    const cur = `${m.aScore}-${m.bScore}`;
                    const opts = [["0-0", "0 - 0"], ["2-0", "2 - 0"], ["2-1", "2 - 1"], ["1-2", "1 - 2"], ["0-2", "0 - 2"]];
                    const selOpts = opts.map(([v, l]) => `<option value="${v}"${cur === v ? " selected" : ""}>${l}</option>`).join("");
                    html += `<div class="match-card">
        <div class="match-teams">
          <div class="team-chip"><img src="${logo(m.A)}" onerror="this.style.display='none'"><span>${m.A}</span></div>
          <span class="vs-badge">VS</span>
          <div class="team-chip"><img src="${logo(m.B)}" onerror="this.style.display='none'"><span>${m.B}</span></div>
        </div>
        <div class="score-wrap"><select class="score-sel" data-idx="${m.i}">${selOpts}</select></div>
      </div>`;
                }
                html += `</div>`;
            }
            document.getElementById("schedContent").innerHTML = html;
            document.querySelectorAll(".score-sel").forEach(sel => {
                sel.addEventListener("change", () => {
                    const idx = parseInt(sel.dataset.idx);
                    const [a, b] = sel.value.split("-").map(Number);
                    schedule[idx].aScore = a; schedule[idx].bScore = b;
                    saveSchedule(); renderStandings();
                });
            });
        }

        function renderStandings() {
            const stats = computeStats();
            const arr = sorted(stats);
            const tbody = document.getElementById("standBody");
            tbody.innerHTML = arr.map((t, i) => {
                const rc = i === 0 ? "r1" : i === 1 ? "r2" : i === 2 ? "r3" : "";
                const rowCls = i < 6 ? "top-row" : "bot-row";
                const ngCls = t.ng >= 0 ? "ng-pos" : "ng-neg";
                const ngStr = t.ng > 0 ? "+" + t.ng : t.ng;
                return `<tr class="${rowCls}">
      <td><span class="rank-cell ${rc}">${i + 1}</span></td>
      <td><div class="team-cell-inner"><img src="${logo(t.name)}" onerror="this.style.display='none'"><span class="team-name-s">${t.name}</span></div></td>
      <td class="mp-val">${t.mp}</td>
      <td>${t.win} - ${t.lose}</td>
      <td class="${ngCls}">${ngStr}</td>
      <td>${t.gw} - ${t.gl}</td>
    </tr>`;
            }).join("");
        }

        function switchTab(tab) {
                mobileTab = tab;
                const sp = document.getElementById("schedulePanel");
                const stp = document.getElementById("standingsPanel");

                document.getElementById("tabSched").classList.toggle("active", tab === "schedule");
                document.getElementById("tabStand").classList.toggle("active", tab === "standings");

                if (window.innerWidth <= 700) {
                    sp.classList.toggle("hidden", tab !== "schedule");
                    stp.classList.toggle("hidden", tab !== "standings");
                }
            }

        function init() {

            const tf = document.getElementById("teamFilter");
            TEAMS.forEach(t => {
                const opt = document.createElement("option");
                opt.value = t;
                opt.textContent = t;
                tf.appendChild(opt);
            });

            tf.addEventListener("change", () => {
                activeTeam = tf.value;
                renderSchedule();
            });
            loadSchedule();
            renderWeekNav();
            renderSchedule();
            renderStandings();
            document.getElementById("resetBtn").addEventListener("click", () => {
                if (confirm("Reset ke jadwal & skor default?")) {
                    schedule = JSON.parse(JSON.stringify(DEFAULT));
                    saveSchedule(); renderSchedule(); renderStandings();
                }
            });
            document.getElementById("clearBtn").addEventListener("click", () => {
                if (confirm("Kosongkan semua skor (set ke 0-0)?")) {
                    schedule.forEach(m => { m.aScore = 0; m.bScore = 0; });
                    saveSchedule(); renderSchedule(); renderStandings();
                }
            });
        }
    if (window.innerWidth <= 700) {
        switchTab("schedule");
    }
        init();
    </script>
</body>

</html>
